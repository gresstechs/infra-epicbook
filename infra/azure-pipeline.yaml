trigger:
  branches:
    include:
      - main

pool:
  name: Azure-Devops-Pipeline

variables:
  TF_VERSION: '1.7.0'

stages:
  - stage: Terraform
    displayName: Provision Infrastructure
    jobs:
      - job: TerraformApply
        displayName: Terraform Init → Plan → Apply
        steps:
          - checkout: self
            displayName: Checkout infra repo

          - script: |
              wget -q https://releases.hashicorp.com/terraform/$(TF_VERSION)/terraform_$(TF_VERSION)_linux_amd64.zip
              unzip -o terraform_$(TF_VERSION)_linux_amd64.zip
              sudo mv terraform /usr/local/bin/
              terraform version
            displayName: Install Terraform

          - script: terraform init
            displayName: Terraform Init
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_TENANT_ID: $(ARM_TENANT_ID)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)

          - script: terraform plan -out=tfplan
            displayName: Terraform Plan
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_TENANT_ID: $(ARM_TENANT_ID)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              TF_VAR_subscription_id: $(ARM_SUBSCRIPTION_ID)
              TF_VAR_client_id: $(ARM_CLIENT_ID)
              TF_VAR_client_secret: $(ARM_CLIENT_SECRET)
              TF_VAR_tenant_id: $(ARM_TENANT_ID)
              TF_VAR_admin_ssh_public_key: $(EPICBOOK_SSH_PUBLIC_KEY)

          - script: |
              terraform apply -auto-approve tfplan
              echo "##vso[task.setvariable variable=APP_PUBLIC_IP;isOutput=true]$(terraform output -raw app_public_ip)"
            displayName: Terraform Apply + Capture Outputs
            name: tfApply
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_TENANT_ID: $(ARM_TENANT_ID)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              TF_VAR_subscription_id: $(ARM_SUBSCRIPTION_ID)
              TF_VAR_client_id: $(ARM_CLIENT_ID)
              TF_VAR_client_secret: $(ARM_CLIENT_SECRET)
              TF_VAR_tenant_id: $(ARM_TENANT_ID)
              TF_VAR_admin_ssh_public_key: $(EPICBOOK_SSH_PUBLIC_KEY)

          - script: terraform output
            displayName: Show All Outputs
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_TENANT_ID: $(ARM_TENANT_ID)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)